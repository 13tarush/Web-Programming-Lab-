<!DOCTYPE html>
<html>
<head>
    <title>Route Information Card</title>
    <!-- Task 2: Link external CSS -->
    <link rel="stylesheet" href="../Experiment 2/style.css">
</head>
<body>

<center>
    <h1>🛣️ Route Information Card</h1>
</center>

<hr>

<center>
    <fieldset>
    <legend><strong>Route Details</strong></legend>

    <table cellpadding="8">
        <tr>
            <td><strong>Route No</strong></td>
            <td>:</td>
            <td><mark>101</mark></td>
        </tr>
        <tr>
            <td><strong>Source</strong></td>
            <td>:</td>
            <td>Andheri</td>
        </tr>
        <tr>
            <td><strong>Destination</strong></td>
            <td>:</td>
            <td>Churchgate</td>
        </tr>
        <tr>
            <td><strong>Total Stops</strong></td>
            <td>:</td>
            <td>18</td>
        </tr>
        <tr>
            <td><strong>Status</strong></td>
            <td>:</td>
            <td><mark>✅ Active</mark></td>
        </tr>
    </table>

    <br>

    <center>
        <figure>
            <img src="Railway Route Image.jpg" alt="Railway Route Overview" width="800">
            <figcaption>
                <small>Railway route overview for Route 101</small>
            </figcaption>
        </figure>
    </center>

</fieldset>

</center>

<hr>

</body>
</html>
