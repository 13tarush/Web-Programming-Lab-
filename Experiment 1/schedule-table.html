<!DOCTYPE html>
<html>
<head>
    <title>Daily Transport Schedule</title>
    <!-- Task 2: Link external CSS -->
    <link rel="stylesheet" href="../Experiment 2/style.css">

<body>

<center>
    <h1>⏰ Daily Transport Schedule</h1>
    <p><em>Route-wise arrival and departure timings</em></p>
</center>

<hr>

<center>
    <fieldset>
        <legend><strong>🚍 Route 101 Schedule</strong></legend>

        <table border="1" cellpadding="8">
            <caption><strong>Daily Transport Schedule</strong></caption>

            <tr>
                <th>Route No</th>
                <th>Stop Name</th>
                <th>Arrival Time</th>
                <th>Departure Time</th>
            </tr>

            <tr>
                <td>101</td>
                <td>Andheri</td>
                <td>08:00</td>
                <td>08:05</td>
            </tr>

            <tr>
                <td>101</td>
                <td>Bandra</td>
                <td>08:30</td>
                <td>08:35</td>
            </tr>

            <tr>
                <td>101</td>
                <td>Churchgate</td>
                <td>09:15</td>
                <td>—</td>
            </tr>
        </table>

    </fieldset>
</center>

<hr>

<center>
    <small>Schedule timings are subject to traffic conditions</small>
</center>

<center>
    <figure>
        <img src="Mumbai Railway Route Stops.jpg" alt="Railway Route Overview" width="500">
        <figcaption>
            <small>Railway route Stops and Landmarks</small>
        </figcaption>
    </figure>
</center>

</body>
</html>
