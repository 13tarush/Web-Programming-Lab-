<!DOCTYPE html>
<html>
<head>
    <title>Citizen Feedback Form</title>
    <!-- Task 2: Link external CSS -->
    <link rel="stylesheet" href="../Experiment 2/style.css">
</head>
<body>

<center>
    <h1>💬 Citizen Feedback Form</h1>
    <p><em>Your feedback helps us improve transport services</em></p>
</center>

<hr>

<center>
<form>
    <fieldset>
        <legend><strong>📝 Feedback Details</strong></legend>

        <table cellpadding="8">
            <tr>
                <td><strong>Name</strong></td>
                <td>:</td>
                <td>
                    <input type="text" required>
                    <mark>*</mark>
                </td>
            </tr>

            <tr>
                <td><strong>Contact</strong></td>
                <td>:</td>
                <td>
                    <input type="text" required>
                    <mark>*</mark>
                </td>
            </tr>

            <tr>
                <td><strong>Route</strong></td>
                <td>:</td>
                <td>
                    <select>
                        <option>Route 101</option>
                        <option>Route 202</option>
                        <option>Route 303</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><strong>Feedback</strong></td>
                <td>:</td>
                <td>
                    <textarea rows="4" cols="25" required></textarea>
                    <mark>*</mark>
                </td>
            </tr>

            <tr>
                <td colspan="3" align="center">
                    <input type="submit" value="Submit Feedback">
                </td>
            </tr>
        </table>

        <center>
            <small><mark>*</mark> Mandatory fields</small>
        </center>

    </fieldset>
</form>
</center>

<center>
    <figure>
        <img src="Citizen Feedback Form.jpg" alt="Railway Passenger Feedback and Assistance" width="500">
        <figcaption>
            <small>Passenger feedback and assistance services</small>
        </figcaption>
    </figure>
</center>

<br>

<hr>
</body>
</html>
