<!DOCTYPE html>
<html>
<head>
    <title>Route Map</title>
    <!-- Task 2: Link external CSS -->
    <link rel="stylesheet" href="../Experiment 2/style.css">
</head>
<body>

<center>
    <h1>🗺️ Route Map & Major Stops</h1>
    <p><em>Visual representation of transport routes and stations</em></p>
</center>

<hr>

<center>
    <fieldset>
        <legend><strong>📍 City Transport Route Map</strong></legend>

        <figure>
            <img src="https://erail.in/images/net-map/mumbai-local-trains.jpg" alt="City Transport Route Map" usemap="#stops" width="800">

            <figcaption>
                <small>
                    Click on highlighted areas to view major stops
                </small>
            </figcaption>
        </figure>

        <map name="stops">
            <area shape="rect" coords="50,50,150,150" alt="Andheri">
            <area shape="rect" coords="200,50,300,150" alt="Bandra">
        </map>

    </fieldset>
</center>

<hr>

<center>
    <small>
        Map is for reference purposes only <br>
        Source: City Transport Authority
    </small>
</center>

</body>
</html>
