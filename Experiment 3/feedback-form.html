<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Passenger Feedback</title>

  <!-- External CSS (Experiment 2 Task 2) -->
  <link rel="stylesheet" href="style.css">

  <!-- Internal CSS (Experiment 2 Task 1) -->
  <style>
    .feedback-note {
      text-align: center;
      font-style: italic;
      color: #555;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<header class="site-header">
  <!-- Inline CSS (Experiment 2 Task 1) -->
  <h1 style="text-align:center;">Passenger Feedback</h1>
</header>

<nav class="main-nav">
  <a href="index.html">Home</a>
  <a href="explore-lines.html">View Routes</a>
  <a href="journey-planner.html">Plan Journey</a>
  <a href="schedule-table.html">Schedules</a>
  <a href="service-category.html">Train Types</a>
  <a href="feedback-form.html">Feedback</a>
</nav>

<main class="container">

  <!-- Internal CSS usage note -->
  <p class="feedback-note">
    Feedback form instructions on this page are styled using internal CSS.
  </p>

  <!-- Feedback Card -->
  <section class="feedback-card">

  <h2 style="text-align:center; margin-bottom:25px;">
    Share Your Experience
  </h2>

  <div class="feedback-wrapper">

    <!-- FORM -->
    <form class="feedback-form">
      <label>Name:</label>
      <input type="text" required>

      <label>Email:</label>
      <input type="email" required>

      <label>Feedback:</label>
      <textarea required></textarea>

      <input type="submit" value="Submit Feedback">
    </form>

    <!-- IMAGE SIDE -->
    <div class="feedback-visual">
      <img src="images/thank-you.jpg" alt="Thank you for travelling">
      <p>Thank you for travelling with us 🚆</p>
    </div>

  </div>

</section>
</main>

<footer class="site-footer">
  <p>© Mumbai Suburban Railways Information Portal | Academic Use</p>
</footer>
<script src="script.js"></script>
</body>
</html>
